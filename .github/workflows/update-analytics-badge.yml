name: Update Analytics Badge

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate GA4 badge JSON
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_KEY: ${{ secrets.GA_SERVICE_ACCOUNT_KEY }}
          GA4_METRIC: screenPageViews
          BADGE_OUTPUT_PATH: public/badges/visits.json
          BADGE_LABEL: visits
          BADGE_COLOR: blue
        run: node scripts/update-ga-badge.mjs

      - name: Commit badge update
        run: |
          git add public/badges/visits.json
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update GA visits badge"
          git push
